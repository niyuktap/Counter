<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=PT+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Counter</title>
</head>
<body>
    <div id="container">
        <h3>Counter</h3>
        <button class="btn" id="decrementBtn">-</button>
        <label id="counter" readonly> 0 </label>
        <button class="btn" id="incrementBtn">+</button>
        <div id="btn-container">
            <button class="btn" id="resetBtn">Reset</button>
            <button class="btn" id="saveBtn">Save</button>
            <button class="btn" id="loadBtn">Load</button>
        </div>
    </div>



    <script src="script.js"></script>
</body>
</html>
